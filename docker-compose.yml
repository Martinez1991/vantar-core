# Self-host de referência do OWASP Security Design Review Framework (headless).
# Postgres (com RLS) + API. Sem UI, IA ou integrações corporativas (Enterprise).
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vantar-core-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vantar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vantar}
      POSTGRES_DB: ${POSTGRES_DB:-vantar}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vantar}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: vantar-core-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-vantar}:${POSTGRES_PASSWORD:-vantar}@postgres:5432/${POSTGRES_DB:-vantar}
      APP_DATABASE_URL: postgresql://vantar_app:${APP_DB_PASSWORD:-vantar_app}@postgres:5432/${POSTGRES_DB:-vantar}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
    command:
      - sh
      - -c
      - "node apps/api/dist/database/migrate.js && node apps/api/dist/database/seed.js && node apps/api/dist/main.js"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

volumes:
  pg_data:
