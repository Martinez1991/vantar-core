site_name: Vantar Core — Security Design Review Framework
site_description: Open core (Apache-2.0) documentation — headless Security Design Review. Independent community draft (not yet an OWASP project).
site_url: https://martinez1991.github.io/vantar-core/
repo_url: https://github.com/Martinez1991/vantar-core
repo_name: Martinez1991/vantar-core
docs_dir: docs
site_dir: site
copyright: Apache-2.0 · Security Design Review Framework — independent community draft (not yet an OWASP project)

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: teal
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: pt
          name: Português (BR)
          build: true

nav:
  - Home: index.md
  - Introduction: 00-introduction.md
  - Architecture: architecture.md
  - Security: security.md
  - AI (single-agent): ai.md
  - REST API: api.md
  - Self-host: self-host.md
